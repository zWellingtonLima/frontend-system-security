<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Shield outer glow -->
  <path d="M20 14 L50 5 L80 14 L80 52 C80 72 65 84 50 92 C35 84 20 72 20 52 Z"
        fill="none" stroke="#00e5a0" stroke-width="1.5" opacity="0.2"/>

  <!-- Shield filled -->
  <path d="M22 16 L50 8 L78 16 L78 52 C78 70 64 81 50 89 C36 81 22 70 22 52 Z"
        fill="#0d1a14" stroke="#00e5a0" stroke-width="1.8" filter="url(#glow)"/>

  <!-- Lock body -->
  <rect x="36" y="50" width="28" height="22" rx="3"
        fill="#00e5a0" filter="url(#glow-strong)" opacity="0.9"/>

  <!-- Lock shackle -->
  <path d="M40 50 L40 42 C40 33 60 33 60 42 L60 50"
        fill="none" stroke="#00e5a0" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Lock keyhole circle -->
  <circle cx="50" cy="59" r="4" fill="#0d1a14"/>
  <!-- Lock keyhole slot -->
  <rect x="48" y="59" width="4" height="7" rx="1" fill="#0d1a14"/>
</svg>
