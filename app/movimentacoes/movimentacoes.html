<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg" href="../../shared/public/favicon.svg" />

    <title>Seguranças — Movimentações</title>
    <link rel="stylesheet" href="../../shared/css/style.css" />

    <script src="../shared/scripts/api/logout.js" defer></script>
    <script src="../shared/scripts/UI/modals.js" defer></script>
    <script type="module" src="scripts/movimentacoes.js"></script>
  </head>
  <body>
    <div class="container-dashboard">
      <header class="topbar">
        <div class="topbar-brand">
          <div class="dot"></div>
          Seguranças da pesada
          <img src="../../shared/public/favicon.svg" height="28" alt="" />
        </div>
        <div class="topbar-right">
          <button class="btn btn-danger btn-sm" onclick="doLogout()">
            Sair
          </button>
        </div>
      </header>

      <nav class="navbar">
        <a class="nav-item" href="../dashboard.html">Dashboard</a>
        <a class="nav-item active" href="../movimentacoes/movimentacoes.html"
          >Movimentações</a
        >
        <a class="nav-item" href="../registar-pessoa/index.html">Pessoas</a>
        <a class="nav-item" href="../chaves/chaves.html">Chaves</a>
        <a class="nav-item" href="../ocorrencias/ocorrencias.html"
          >Ocorrências</a
        >
        <a class="nav-item" href="../consumos/consumos.html">Consumos</a>
      </nav>

      <main class="main">
        <div class="page-header">
          <div>
            <div class="page-title">Movimentações</div>
          </div>
          <button class="btn btn-primary" onclick="openModal('modalEntrada')">
            + Nova Entrada
          </button>
        </div>

        <div class="card mb">
          <div class="card-title">Atualmente no Edifício</div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Nome</th>
                  <th>Tipo</th>
                  <th>Entrada</th>
                  <th>Destino / Setor</th>
                  <th>Ação</th>
                </tr>
              </thead>
              <tbody id="tbodyAtivos"></tbody>
            </table>
          </div>
        </div>

        <hr class="divider"></hr>

        <div class="card">
          <div class="card-title">Histórico do Dia</div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Nome</th>
                  <th>Tipo</th>
                  <th>Entrada</th>
                  <th>Saída</th>
                  <th>Duração</th>
                </tr>
              </thead>
              <tbody id="tbodyHistorico"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <!-- MODAL ENTRADA -->
    <div class="overlay" id="modalEntrada">
      <div class="modal">
        <button class="close-btn" onclick="closeModal('modalEntrada')">
          ✕
        </button>
        <div class="modal-title">Registar Entrada</div>

        <div class="form-group">
          <label>Tipo de Entrada</label>
          <select id="eTipo" onchange="toggleEntradaTipo()">
            <option value="funcionario">Funcionário</option>
            <option value="visitante">Visita</option>
            <option value="servico">Prestação de Serviço</option>
            <option value="entrega">Entrega</option>
            <option value="manutencao">Manutenção</option>
          </select>
        </div>

        <!-- SECÇÃO FUNCIONÁRIO -->
        <div id="secFuncionario">
          <input type="hidden" id="eIdFuncionario" />
          <div class="form-row">
            <div class="form-group">
              <label>Nome do Funcionário</label>
              <div class="autocomplete-wrapper">
                <input
                  type="text"
                  id="eNomeFuncionario"
                  placeholder="Nome completo"
                  autocomplete="off"
                  oninput="onPessoaInput('funcionario')"
                />
                <div
                  class="autocomplete-dropdown hidden"
                  id="dropdownFuncionario"
                ></div>
              </div>
            </div>
            <div class="form-group">
              <label>Setor</label>
              <input
                type="text"
                id="eSetorFuncionario"
                placeholder="Preenchido automaticamente"
                readonly
              />
            </div>
          </div>
        </div>

        <!-- SECÇÃO VISITA -->
        <div id="secVisita" class="hidden">
          <input type="hidden" id="eIdVisitante" />
          <div class="form-row">
            <div class="form-group">
              <label>Nome do Visitante</label>
              <div class="autocomplete-wrapper">
                <input
                  type="text"
                  id="eNomeVisita"
                  placeholder="Nome completo"
                  autocomplete="off"
                  oninput="onPessoaInput('visitante')"
                />
                <div
                  class="autocomplete-dropdown hidden"
                  id="dropdownVisitante"
                ></div>
              </div>
            </div>
            <div class="form-group">
              <label>Empresa</label>
              <input
                type="text"
                id="eEmpresa"
                placeholder="Preenchido automaticamente"
                readonly
              />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Documento de Identificação</label>
              <input
                type="text"
                id="eDocumento"
                placeholder="Preenchido automaticamente"
                readonly
              />
            </div>
            <div class="form-group">
              <label>Setor Destino</label>
              <input
                type="text"
                id="eSetorDestino"
                placeholder="Departamento / Sala"
              />
            </div>
          </div>
          <div class="form-group">
            <label>Funcionário Responsável (Opcional)</label>
            <input type="hidden" id="eIdFuncResponsavel" />
            <div class="autocomplete-wrapper">
              <input
                type="text"
                id="eFuncResponsavel"
                placeholder="Quem recebe"
                autocomplete="off"
                oninput="onPessoaInput('responsavel')"
              />
              <div
                class="autocomplete-dropdown hidden"
                id="dropdownResponsavel"
              ></div>
            </div>
          </div>
        </div>

        <!-- CHAVE OPCIONAL -->
        <div
          class="section-toggle mb"
          id="keyToggle"
          onclick="toggleKeySection()"
        >
          <div class="section-toggle-icon" id="keyToggleIcon"></div>
          <span class="section-toggle-label"
            >🔑 Incluir entrega de chave (opcional)</span
          >
        </div>
        <div class="section-body hidden" id="keySection">
          <input type="hidden" id="eIdChave" />
          <div class="form-group">
            <label>Pesquisar Chave Disponível</label>
            <div class="autocomplete-wrapper">
              <input
                type="text"
                id="eChaveBusca"
                placeholder="Ex: CHV-101 ou Molho TI"
                autocomplete="off"
                oninput="onChaveInput()"
              />
              <div
                class="autocomplete-dropdown hidden"
                id="dropdownChave"
              ></div>
            </div>
            <div id="chaveSelecionada" class="selected-chip hidden">
              <span id="chaveLabel"></span>
              <button type="button" onclick="limparChave()">✕</button>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>Observações</label>
          <textarea
            id="eObs"
            placeholder="Notas adicionais (opcional)"
          ></textarea>
        </div>

        <!-- MENSAGENS -->
        <div id="msgBoxEntrada" class="alert mt mb"></div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="closeModal('modalEntrada')">
            Cancelar
          </button>
          <button class="btn btn-primary" onclick="registarEntrada()">
            Confirmar Entrada
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
