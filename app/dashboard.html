<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seguranças - Dashboard</title>
    <link rel="stylesheet" href="../shared/css/style.css" />
  </head>
  <body>
    <div class="container-dashboard">
      <header class="topbar">
        <div class="topbar-brand">
          <div class="dot"></div>
          Seguranças da pesada
        </div>
        <div class="topbar-right">
          <button class="btn btn-ghost btn-sm" onclick="doLogout()">
            Sair
          </button>
        </div>
      </header>

      <nav class="navbar">
        <a class="nav-item active" href="dashboard.html"> Dashboard </a>
        <a class="nav-item" href="./movimentacoes/movimentacoes.html">
          Movimentações
        </a>
        <a class="nav-item" href="./registar-pessoa/index.html"> Pessoas </a>
        <a class="nav-item" href="./chaves/chaves.html"> Chaves </a>
        <a class="nav-item" href="./ocorrencias/ocorrencias.html">
          Ocorrências
        </a>
        <a class="nav-item" href="./consumos/consumos.html"> Consumos </a>
      </nav>

      <main class="main">
        <div class="page-header">
          <div>
            <div class="page-title">Dashboard</div>
          </div>
        </div>

        <div class="grid-4" style="margin-bottom: 1.5rem">
          <div class="stat-card">
            <div>
              <div class="stat-label">No Edifício</div>
              <div class="stat-value" id="statDentro">0</div>
            </div>
          </div>
          <div class="stat-card">
            <div>
              <div class="stat-label">Visitas Ativas</div>
              <div class="stat-value" id="statVisitas">0</div>
            </div>
          </div>
          <div class="stat-card">
            <div>
              <div class="stat-label">Chaves em Uso</div>
              <div class="stat-value" id="statChaves">0</div>
            </div>
          </div>
          <div class="stat-card">
            <div>
              <div class="stat-label">Ocorrências</div>
              <div class="stat-value" id="statRondas">0</div>
            </div>
          </div>
        </div>

        <div class="grid-2">
          <div class="card">
            <div class="card-title">Presentes no Edifício</div>
            <div id="dashPresentes">
              <div class="empty-state">
                <div class="icon">🏢</div>
                Ninguém registado
              </div>
            </div>
          </div>
          <div class="card">
            <div class="card-title">Chaves Activas</div>
            <div id="dashChavesAtivas">
              <div class="empty-state">
                <div class="icon">🔑</div>
                Nenhuma chave emprestada
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
