<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg" href="../../shared/public/favicon.svg" />
    <title>Seguranças — Chaves</title>
    <link rel="stylesheet" href="../../shared/css/style.css" />
    <script src="../shared/scripts/api/logout.js" defer></script>
    <script src="../shared/scripts/UI/modals.js" defer></script>
    <script type="module" src="./scripts/chaves.js"></script>
    
    <script type="module" src="../shared/scripts/sessionIsValid.js"></script>
  </head>
  <body>
    <div class="container-dashboard">
      <header class="topbar">
        <div class="topbar-brand">
          <div class="dot"></div>
          Seguranças da pesada
          <img src="../../shared/public/favicon.svg" height="28" alt="" />
        </div>
        <div class="topbar-right">
          <button class="btn btn-danger btn-sm" onclick="doLogout()">
            Sair
          </button>
        </div>
      </header>

      <nav class="navbar">
        <a class="nav-item" href="../dashboard.html">Dashboard</a>
        <a class="nav-item" href="../movimentacoes/movimentacoes.html"
          >Movimentações</a
        >
        <a class="nav-item" href="../registar-pessoa/index.html">Pessoas</a>
        <a class="nav-item active" href="../chaves/chaves.html">Chaves</a>
        <a class="nav-item" href="../ocorrencias/ocorrencias.html"
          >Ocorrências</a
        >
        <a class="nav-item" href="../consumos/consumos.html">Consumos</a>
      </nav>

      <main class="main">
        <div class="page-header">
          <div>
            <div class="page-title">Gestão de Chaves</div>
            <a href="./historico.html">Ver histórico de devoluções</a>
          </div>

          <button
            class="btn btn-primary"
            onclick="openModal('modalEntregarChave')"
          >
            🔑 Entregar Chave
          </button>
        </div>

        <div class="card">
          <div class="card-title">Chaves Emprestadas</div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Chave / Molho</th>
                  <th>Tipo</th>
                  <th>Sala</th>
                  <th>Com</th>
                  <th>Desde</th>
                  <th>Ação</th>
                </tr>
              </thead>
              <tbody id="tbodyEmprestadas"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <!-- MODAL DEVOLUÇÃO -->
    <div class="overlay" id="modalDevolucaoChave">
      <div class="modal">
        <button class="close-btn" onclick="closeModal('modalDevolucaoChave')">
          ✕
        </button>
        <div class="modal-title">Registar Devolução</div>

        <input type="hidden" id="cIdEntrega" />

        <div class="form-group">
          <label>Chave</label>
          <input type="text" id="cDescricaoChave" readonly />
        </div>
        <div class="form-group">
          <label>Com</label>
          <input type="text" id="cNomePessoa" readonly />
        </div>
        <div class="form-group">
         <div class="form-group">
  <label>Devolvida por</label>
  <div class="autocomplete-wrapper">
    <input
      type="text"
      id="cDevolvidaPor"
      placeholder="Nome de quem entrega a chave"
      autocomplete="off"
      oninput="onDevolvidaPorInput()"
    />
    <div
      class="autocomplete-dropdown hidden"
      id="dropdownDevolvidaPor"
    ></div>
  </div>
  <input type="hidden" id="cDevolvidaPorTipo" />
</div>

        <div id="msgBoxChave" class="alert" style="display: none"></div>

        <div class="modal-footer">
          <button
            class="btn btn-ghost"
            onclick="closeModal('modalDevolucaoChave')"
          >
            Cancelar
          </button>
          <button class="btn btn-primary" onclick="confirmarDevolucaoChave()">
            Confirmar Devolução
          </button>
        </div>
      </div>
    </div>

    <!-- MODAL ENTREGA AVULSA  -->
    <div class="overlay" id="modalEntregarChave">
      <div class="modal">
        <button class="close-btn" onclick="closeModal('modalEntregarChave')">
          ✕
        </button>
        <div class="modal-title">Entregar Chave</div>
        <p class="modal-subtitle">
          Painel para entrega de chaves para pessoas que já estão no edifício.
        </p>

        <input type="hidden" id="cIdMovimentacao" />
        <input type="hidden" id="cIdChaveEntrega" />

        <div class="form-group">
          <label>Pessoa no Edifício</label>
          <div class="autocomplete-wrapper">
            <input
              type="text"
              id="cNomePessoaEntrega"
              placeholder="Nome da pessoa"
              autocomplete="off"
              oninput="onEntradaAtivaInput()"
            />
            <div
              class="autocomplete-dropdown hidden"
              id="dropdownEntradaAtiva"
            ></div>
          </div>
          <div id="pessoaSelecionadaInfo" class="selected-chip hidden">
            <span id="pessoaEntregaLabel"></span>
            <button type="button" onclick="limparPessoaEntrega()">✕</button>
          </div>
        </div>

        <div class="form-group">
          <label>Chave a Entregar</label>
          <div class="autocomplete-wrapper">
            <input
              type="text"
              id="cChaveBuscaEntrega"
              placeholder="Ex: CHV-101 ou Molho TI"
              autocomplete="off"
              oninput="onChaveBuscaEntregaInput()"
            />
            <div
              class="autocomplete-dropdown hidden"
              id="dropdownChaveEntrega"
            ></div>
          </div>
          <div id="chaveEntregaSelecionada" class="selected-chip hidden">
            <span id="chaveLabelEntrega"></span>
            <button type="button" onclick="limparChaveEntrega()">✕</button>
          </div>
        </div>

        <div id="msgBoxEntregarChave" class="alert"></div>

        <div class="modal-footer">
          <button
            class="btn btn-ghost"
            onclick="closeModal('modalEntregarChave')"
          >
            Cancelar
          </button>
          <button class="btn btn-primary" onclick="confirmarEntregaAvulsa()">
            Confirmar Entrega
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
