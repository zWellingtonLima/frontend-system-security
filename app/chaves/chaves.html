<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg" href="../../shared/public/favicon.svg" />
    <title>Seguranças — Chaves</title>
    <link rel="stylesheet" href="../../shared/css/style.css" />

    <script src="../shared/scripts/api/logout.js" defer></script>

    <script src="../shared/scripts/UI/modals.js" defer></script>
  </head>
  <body>
    <div class="container-dashboard">
      <header class="topbar">
        <div class="topbar-brand">
          <div class="dot"></div>
          Seguranças da pesada
          <img src="../../shared/public/favicon.svg" height="28" alt="" />
        </div>
        <div class="topbar-right">
          <button class="btn btn-danger btn-sm" onclick="doLogout()">
            Sair
          </button>
        </div>
      </header>

      <nav class="navbar">
        <a class="nav-item" href="../dashboard.html"> Dashboard </a>
        <a class="nav-item" href="../movimentacoes/movimentacoes.html">
          Movimentações
        </a>
        <a class="nav-item" href="../registar-pessoa/index.html"> Pessoas </a>
        <a class="nav-item active" href="../chaves/chaves.html"> Chaves </a>
        <a class="nav-item" href="../ocorrencias/ocorrencias.html">
          Ocorrências
        </a>
        <a class="nav-item" href="../consumos/consumos.html"> Consumos </a>
      </nav>

      <main class="main">
        <div class="page-header">
          <div>
            <div class="page-title">Gestão de Chaves</div>
          </div>
          <button class="btn btn-primary" onclick="openModal('modalChave')">
            + Emprestar Chave
          </button>
        </div>

        <div class="grid-2">
          <div class="card">
            <div class="card-title">Chaves Emprestadas</div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Código</th>
                    <th>Sala</th>
                    <th>Tipo</th>
                    <th>Com</th>
                    <th>Ação</th>
                  </tr>
                </thead>
                <tbody id="tbodyEmprestadas"></tbody>
              </table>
            </div>
          </div>
          <div class="card">
            <div class="card-title">Histórico de Devoluções</div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Código</th>
                    <th>Sala</th>
                    <th>Tipo</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody id="tbodyDevolvidas"></tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>

    <div class="overlay" id="modalChave">
      <div class="modal">
        <button class="close-btn" onclick="closeModal('modalChave')">✕</button>
        <div class="modal-title">Emprestar Chave</div>
        <div class="form-row">
          <div class="form-group">
            <label>Código da Chave</label>
            <input type="text" id="cCodigo" placeholder="Ex: CH-001" />
          </div>
          <div class="form-group">
            <label>Sala / Número</label>
            <input type="text" id="cSala" placeholder="Ex: 204" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Tipo de Chave</label>
            <select id="cTipo">
              <option value="Principal">Principal</option>
              <option value="Reserva">Reserva</option>
              <option value="Mestra">Mestra</option>
            </select>
          </div>
          <div class="form-group">
            <label>Entregue a</label>
            <input
              type="text"
              id="cEntregueA"
              placeholder="Nome do responsável"
            />
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="closeModal('modalChave')">
            Cancelar
          </button>
          <button class="btn btn-primary" onclick="emprestarChave()">
            Confirmar Empréstimo
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
