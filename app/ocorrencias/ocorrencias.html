<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg" href="../../shared/public/favicon.svg" />
    <title>Seguranças — Ocorrências</title>
    <link rel="stylesheet" href="../../shared/css/style.css" />
    <script type="module" src="../shared/scripts/sessionIsValid.js"></script>
    <script src="../shared/scripts/UI/modals.js" defer></script>
    <script type="module" src="../shared/scripts/api/logout.js" defer></script>
    <script
      type="module"
      src="../shared/scripts/utils/getSegurancaNome.js"
    ></script>
    <script type="module" src="./scripts/registarOcorrencia.js"></script>
    <script type="module" src="./scripts/editarOcorrencia.js"></script>
  </head>
  <body>
    <div class="container-dashboard">
      <header class="topbar">
        <div class="topbar-brand">
          <div class="dot"></div>
          Seguranças da pesada
          <img src="../../shared/public/favicon.svg" height="28" alt="" />
        </div>
        <div class="topbar-right">
          <span id="segurancaNome" class="segurancaNome"></span>
          <button id="logout-btn" class="btn btn-danger btn-sm">Sair</button>
        </div>
      </header>

      <nav class="navbar">
        <a class="nav-item" href="../dashboard.html">Dashboard</a>
        <a class="nav-item" href="../movimentacoes/movimentacoes.html"
          >Movimentações</a
        >
        <a class="nav-item" href="../registar-pessoa/index.html">Pessoas</a>
        <a class="nav-item" href="../chaves/chaves.html">Chaves</a>
        <a class="nav-item active" href="../ocorrencias/ocorrencias.html"
          >Ocorrências</a
        >
        <a class="nav-item" href="../consumos/consumos.html">Consumos</a>
      </nav>

      <main class="main">
        <div class="form-inline mb">
          <div class="card-title">Registar nova ocorrência</div>
          <form id="formOcorrencia">
            <div class="form-group">
              <label for="tipoOcorrencia">Tipo de Ocorrência</label>
              <select id="tipoOcorrencia" name="tipoOcorrencia" required>
                <option value="" disabled selected>A carregar...</option>
              </select>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="descricao">Descrição</label>
                <textarea
                  id="descricao"
                  name="descricao"
                  placeholder="Descreva a ocorrência encontrada..."
                  required
                ></textarea>
              </div>
              <div class="form-inline-actions">
                <button class="btn btn-primary btn-full">
                  Confirmar ocorrência
                </button>
              </div>
            </div>

            <div id="alertOcorrencia" class="alert hidden"></div>
          </form>
        </div>

        <div class="card">
          <div class="card-header">
            <div class="card-title">Histórico de Ocorrências</div>
            <div class="filter-bar">
              <button class="filter-btn" data-endpoint="ocorrencias">Todas</button>
              <button class="filter-btn active" data-endpoint="ocorrencias/hoje">Hoje</button>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Data / Hora</th>
                  <th>Segurança</th>
                  <th>Tipo</th>
                  <th>Descrição</th>
                  <th>Estado</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="tbodyOcorrencias">
                <tr>
                  <td colspan="4">
                    <div class="empty-state">
                      <div class="icon">🛡️</div>
                      A carregar ocorrências...
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <!-- MODAL EDITAR OCORRÊNCIA -->
    <div class="overlay" id="modalEdicaoOcorrencia">
      <div class="modal">
        <button class="close-btn" data-close="modalEdicaoOcorrencia">✕</button>
        <div class="modal-title">Editar Ocorrência</div>
        <form id="formEdicaoOcorrencia">
          <div class="form-row">
            <div class="form-group">
              <label>Tipo de Ocorrência</label>
              <select id="editTipoOcorrencia"></select>
            </div>
            <div class="form-group">
              <label>Descrição</label>
              <textarea id="editDescricao" maxlength="500" rows="4"></textarea>
            </div>
            <div class="form-group">
              <label>Estado</label>
              <div id="estadoSelector" class="estado-selector"></div>
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-ghost"
              data-close="modalEdicaoOcorrencia"
            >
              Cancelar
            </button>
            <button type="submit" class="btn btn-primary">Guardar</button>
          </div>
        </form>
      </div>
    </div>

  </body>
</html>
