<app-portaria-shell>
  <div class="page-header-row">
    <div>
      <h1 class="portaria-section-title">Chaves</h1>
      <p class="portaria-section-copy">Gestão e empréstimos de chaves</p>
    </div>

    <button
      class="portaria-btn portaria-btn--primary"
      (click)="alternarVisibilidadeModal()"
    >
      <i class="fas fa-plus"></i>
      <span>Emprestar Chave</span>
    </button>
  </div>

  <!-- FILTRAGEM POR TABS -->
  <ng-container *ngIf="tabAtiva$ | async as tabAtiva">
    <div class="tabs">
      <div
        class="tab"
        *ngFor="let tab of tabs"
        [class.active]="tabAtiva.value === tab.value"
        (click)="onTabChange(tab)"
      >
        {{ tab.label }}
      </div>
    </div>
  </ng-container>

  <!-- FILTROS -->
  <div class="filter-container flex">
    <div class="search-wrap flex content-center">
      <i class="fas fa-search"></i>
      <input
        type="text"
        name="search-input"
        class="search-input"
        placeholder="Pesquisar por descrição da ocorrência..."
      />
    </div>
    <select class="filter-select" name="filter-select">
      <option value="">Pisos</option>
      <option value="PRIMEIRO">Primeiro</option>
      <option value="SEGUNDO">Segundo</option>
      <option value="TERCEIRO">Terceiro</option>
    </select>
  </div>

  <!-- TABELA -->
  <div>
    <table class="tbl">
      <thead>
        <tr>
          <th>Edifício</th>
          <th>Chave / Código</th>
          <th>Sala / Piso</th>
          <th>Com Quem</th>
          <th>Desde</th>
          <th>Ações</th>
        </tr>
      </thead>

      <tbody>
        <!-- <tr *ngFor="let item of historicoChaves">
          <td>{{ item.edificio }}</td>
          <td>
            <span class="bold-text">{{ item.descricao }}</span>
          </td>
          <td>{{ item.sala }}</td>
          <td>{{ item.nomePessoa }}</td>
          <td>{{ item.horaEntrega | date: "HH:mm:ss" }}</td>
          <td><button class="btn-action">••• Detalhes</button></td>
        </tr> -->
      </tbody>
    </table>
  </div>

  <!-- <div class="pagination-container">
    <button
      [disabled]="paginaAtual === 1"
      class="btn-page"
    >
      <i class="ft-chevron-left"></i>
    </button>

    <span class="page-info">
      Página <strong>{{ paginaAtual }}</strong> de {{ totalPaginas }}
    </span>

    <button
      [disabled]="paginaAtual === totalPaginas"
      class="btn-page"
    >
      <i class="ft-chevron-right"></i>
    </button>
  </div> -->

  <!-- MODAL EMPRESTAR CHAVE -->
  <app-base-modal
    [modalEstaAberto]="modalIsOpen"
    titulo="Emprestar chave"
    subtitulo="Selecione a chave e quem a leva"
    (fechar)="alternarVisibilidadeModal()"
  >
    <form class="portaria-modal__body">
      <p class="form-tipo-title">CHAVES DISPONÍVEIS</p>

      <div class="form-row-port">
        <div class="form-group-port">
          <!-- EDIFICIO-A CHAVES -->
          <label for="edificio-a" class="form-label-port">Edifício A</label>
          <select id="edificio-a" class="filter-select">
            <option value="">Escolher chave...</option>
            <option value="1">CHV-01</option>
          </select>
        </div>
        <div class="form-group-port">
          <!-- EDIFICIO-B CHAVES -->
          <label for="edificio-b" class="form-label-port">Edifício B</label>
          <select id="edificio-b" class="filter-select">
            <option value="">Escolher chave...</option>
            <option value="1">CHV-01</option>
          </select>
        </div>
      </div>
      <div class="form-row-port full">
        <div class="form-group-port">
          <label for="emprestimo-pessoa" class="form-label-port"
            >Nome da pessoa</label
          >
          <div class="search-wrap">
            <i class="icon-user-follow"></i>
            <input
              type="text"
              class="search-input"
              name="emprestimo-pessoa"
              id="emprestimo-pessoa"
              placeholder="Quem está a levar a chave..."
            />
          </div>
        </div>
      </div>
    </form>

    <ng-container slot="footer">
      <button
        class="portaria-btn portaria-btn--ghost"
        (click)="alternarVisibilidadeModal()"
      >
        Cancelar
      </button>
      <button type="submit" class="portaria-btn portaria-btn--primary">
        <i class="fas fa-key"></i>
        Emprestar

        <!-- <ng-template #loadingState>
          <img class="loader" src="assets/img/oval.svg" alt="" />
          A processar...
        </ng-template> -->
      </button>
    </ng-container>
  </app-base-modal>
</app-portaria-shell>
