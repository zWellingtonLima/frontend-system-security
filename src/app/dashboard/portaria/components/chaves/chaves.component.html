<app-portaria-shell>
  <div class="page-header-row">
    <div>
      <h1 class="portaria-section-title">Chaves</h1>
      <p class="portaria-section-copy">
        Página de gestão das chaves e empréstimos
      </p>
    </div>

    <button
      class="portaria-btn portaria-btn--primary"
      (click)="alternarVisibilidadeModal()"
    >
      <i class="fas fa-plus"></i>
      <span>Emprestar Chave</span>
    </button>
  </div>

  <div class="filtros-pesquisa">
    <div class="tab active" onclick="setTab('emp')">
      Emprestadas <span class="tab-count">3</span>
    </div>
    <div class="tab" onclick="setTab('todas')">
      Todas <span class="tab-count">26</span>
    </div>
  </div>

  <div class="barra-pesquisa-container">
    <div class="barra-pesquisa">
      <i class="ft-search"></i>
      <input
        class="search-input"
        id="searchInput"
        type="text"
        placeholder="Pesquisar por código, sala ou responsável..."
      />
    </div>
    <select
      class="barra-pesquisa-select"
      id="filterPiso"
      onchange="applyFilters()"
    >
      <option value="">Todos os pisos</option>
      <option value="PRIMEIRO">Primeiro</option>
      <option value="SEGUNDO">Segundo</option>
      <option value="TERCEIRO">Terceiro</option>
    </select>
  </div>

  <div>
    <table class="tbl">
      <thead>
        <tr>
          <th>Edifício</th>
          <th>Chave / Código</th>
          <th>Sala / Piso</th>
          <th>Com Quem</th>
          <th>Desde</th>
          <th>Ações</th>
        </tr>
      </thead>

      <tbody>
        <!-- <tr *ngFor="let item of historicoChaves">
          <td>{{ item.edificio }}</td>
          <td>
            <span class="bold-text">{{ item.descricao }}</span>
          </td>
          <td>{{ item.sala }}</td>
          <td>{{ item.nomePessoa }}</td>
          <td>{{ item.horaEntrega | date: "HH:mm:ss" }}</td>
          <td><button class="btn-action">••• Detalhes</button></td>
        </tr> -->
      </tbody>
    </table>
  </div>

  <!-- <div class="pagination-container">
    <button
      [disabled]="paginaAtual === 1"
      class="btn-page"
    >
      <i class="ft-chevron-left"></i>
    </button>

    <span class="page-info">
      Página <strong>{{ paginaAtual }}</strong> de {{ totalPaginas }}
    </span>

    <button
      [disabled]="paginaAtual === totalPaginas"
      class="btn-page"
    >
      <i class="ft-chevron-right"></i>
    </button>
  </div> -->

  <!-- MODAL EMPRESTAR CHAVE -->
  <app-base-modal
    [modalEstaAberto]="modalIsOpen"
    titulo="Empréstimo de chave"
    subtitulo="Preencha os dados do empréstimo"
    (fechar)="alternarVisibilidadeModal()"
  >
    <form class="portaria-modal__body"></form>

    <ng-container slot="footer">
      <button
        class="portaria-btn portaria-btn--ghost"
        (click)="alternarVisibilidadeModal()"
      >
        Cancelar
      </button>
      <button type="submit" class="portaria-btn portaria-btn--primary">
        <i class="ft-file-plus"></i>
        Emprestar

        <!-- <ng-template #loadingState>
          <img class="loader" src="assets/img/oval.svg" alt="" />
          A processar...
        </ng-template> -->
      </button>
    </ng-container>
  </app-base-modal>
</app-portaria-shell>
