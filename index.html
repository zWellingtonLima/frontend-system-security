<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg" href="./shared/public/favicon.svg" />
    <title>Gerenciamento Segurança</title>

    <script type="module" src="./shared/scripts/loginUser.js" defer></script>

    <link rel="stylesheet" href="./shared/css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="auth-card">
        <div class="auth-logo">Segurança da Pesada</div>
        <div class="auth-title">Autenticação</div>

        <div id="msgBox" class="alert"></div>

        <form>
          <div class="form-group">
            <label>Número de Segurança</label>
            <input type="number" id="usuarioNum" placeholder="Ex: 1042" />
          </div>

          <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••" />
          </div>

          <button class="btn btn-auth btn-primary">Entrar</button>
        </form>

        <div class="auth-switch">
          Não tem conta? <a href="register.html">Registar</a>
        </div>
      </div>
    </div>
  </body>
</html>
